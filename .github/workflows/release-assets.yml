name: Release Assets

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  upload-riff-module:
    name: Upload Riff.bas
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Upload Riff.bas to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" package/Riff.bas --clobber
